name: CI

on:
  push:
    branches: [main, production-hardening]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint (fmt, clippy, tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins the version + components (rustfmt, clippy).
      - name: Rustfmt
        run: cargo fmt --all --check
      - name: Clippy (core + cli)
        run: cargo clippy -p grafiki-core -p grafiki-cli --all-targets -- -D warnings
      - uses: actions/setup-node@v4
        with:
          node-version-file: apps/grafiki-desktop/.nvmrc
          cache: npm
          cache-dependency-path: apps/grafiki-desktop/package-lock.json
      - name: Install web deps
        working-directory: apps/grafiki-desktop
        run: npm ci
      - name: Typecheck frontend
        working-directory: apps/grafiki-desktop
        run: npx tsc --noEmit

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.os }}-${{ hashFiles('Cargo.lock') }}
      # Test the library + CLI + eval harness (the desktop crate is exercised in
      # the desktop job). grafiki-eval's tests include the pytrec_eval metric
      # oracle and the deterministic keyword-retrieval + redaction regression.
      - name: Test core + cli + eval
        run: cargo test -p grafiki-core -p grafiki-cli -p grafiki-eval
      # Cache the ort (ONNX Runtime) binary the `ort` crate downloads at build time.
      - name: Cache ONNX Runtime (ort)
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/ort.pyke.io
            ~/.cache/ort.pyke.io
          key: ort-${{ matrix.os }}-${{ hashFiles('Cargo.lock') }}
      # Ensure the optional embedding features still compile. The `ort` crate
      # downloads an ONNX Runtime binary at build time which can transiently fail
      # on CI, so retry a few times before giving up.
      - name: Build with embedding features
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if cargo build -p grafiki-core -p grafiki-cli --features fastembed,sqlite-vec; then
              exit 0
            fi
            echo "::warning::embedding-features build attempt ${attempt} failed (likely a flaky ort binary download); retrying in 15s"
            sleep 15
          done
          echo "::error::embedding-features build failed after 3 attempts"
          exit 1

  eval-gate:
    name: Eval gate (retrieval + redaction, deterministic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-ubuntu-latest-${{ hashFiles('Cargo.lock') }}
      # Deterministic, model-free: keyword retrieval + redaction over the bundled
      # fixtures, gated on the committed baseline. Any secret leak, a precision
      # drop, or an nDCG@10 regression beyond tolerance fails the build.
      - name: Retrieval + redaction regression gate
        run: |
          cargo run -p grafiki-eval -- run \
            --arm all --mode keyword \
            --baseline crates/grafiki-eval/fixtures/baselines/baseline.json \
            --fail-on-regression --format md

  smoke:
    name: Smoke (end-to-end CLI/HTTP/MCP)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: apps/grafiki-desktop/.nvmrc
      # tauri-build expects the frontend dist to exist when the workspace builds.
      - name: Build frontend
        working-directory: apps/grafiki-desktop
        run: |
          npm ci
          npm run build
      # tauri-build also needs the CLI sidecar staged (externalBin) or the desktop
      # crate (built by smoke's cargo test) fails to resolve the resource.
      - name: Prepare desktop sidecar
        run: bash scripts/prepare_desktop_sidecar.sh debug
      - name: Run smoke suite
        run: bash scripts/smoke.sh

  desktop-build:
    name: Desktop build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: apps/grafiki-desktop/.nvmrc
      - name: Build frontend
        working-directory: apps/grafiki-desktop
        run: |
          npm ci
          npm run build
      - name: Prepare desktop sidecar
        run: bash scripts/prepare_desktop_sidecar.sh debug
      - name: Build desktop crate
        run: cargo build -p grafiki-desktop

  supply-chain:
    name: Supply chain audit
    runs-on: ubuntu-latest
    # Informational: a newly-published advisory should surface but not block merges.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: cargo audit (informational)
        run: |
          cargo install cargo-audit --locked
          cargo audit || echo "::warning::cargo audit reported advisories (see log; mostly unmaintained transitive deps)"
      - uses: actions/setup-node@v4
        with:
          node-version-file: apps/grafiki-desktop/.nvmrc
      - name: npm audit (informational)
        working-directory: apps/grafiki-desktop
        run: npm audit --audit-level=high || echo "::warning::npm audit reported issues (see log)"
